<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>klas</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            overflow: hidden;
        }
        body, html {
            width: 100%;
            height: 100%;
            background-color: #0c0c0f;
            font-family: system-ui, -apple-system, sans-serif;
        }
        #nav-bar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            background: rgba(15, 15, 20, 0.8);
            backdrop-filter: blur(8px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 24px;
            z-index: 99999;
        }
        .title {
            color: #ffffff;
            font-size: 16px;
            font-weight: bold;
        }
        .modern-btn {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #ffffff;
            padding: 8px 16px;
            font-size: 13px;
            font-weight: 600;
            border-radius: 6px;
            cursor: pointer;
            transition: 0.2s ease;
        }
        .modern-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
            padding-top: 50px;
        }
    </style>
</head>
<body>

    <div id="nav-bar">
        <div class="title">klas client</div>
        <button class="modern-btn" onclick="makeFullscreen()">🖥️ Fullscreen Game</button>
    </div>

    <!-- Proxy Frame that runs CloudMoon inside your GitHub link -->
    <iframe id="game-frame" src="https://cloudmoonapp.com" allow="autoplay; gamepad; fullscreen;"></iframe>

    <script>
        // Forces browser tab to say klas for anyone who opens it
        document.title = "klas";
        setInterval(() => {
            if (document.title !== "klas") document.title = "klas";
        }, 250);

        function makeFullscreen() {
            const frame = document.getElementById('game-frame');
            if (frame.requestFullscreen) {
                frame.requestFullscreen();
            }
        }

        // Prevent accidental page closes or tab redirection kicks
        window.onbeforeunload = function() { return true; };
    </script>
</body>
</html>
