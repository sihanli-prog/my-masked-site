<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>klas</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; overflow: hidden; }
        body, html { width: 100%; height: 100%; background-color: #060608; font-family: sans-serif; }
        
        /* Modern Minimalist Header Bar without Minecraft */
        #klas-overlay-header {
            position: fixed; top: 0; left: 0; width: 100%; height: 52px;
            background: rgba(12, 12, 15, 0.9); backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.07);
            display: flex; justify-content: space-between; align-items: center; padding: 0 24px; z-index: 100000;
        }
        .header-title {
            color: #ffffff; font-size: 15px; font-weight: 700; letter-spacing: 0.5px; text-transform: uppercase;
        }
        .control-btn {
            background: rgba(255, 255, 255, 0.06); border: 1px solid rgba(255, 255, 255, 0.12);
            color: #ffffff; padding: 8px 16px; font-size: 12px; font-weight: 600; border-radius: 7px; cursor: pointer; transition: 0.2s ease;
        }
        .control-btn:hover { background: rgba(255, 255, 255, 0.16); border-color: rgba(255, 255, 255, 0.22); transform: translateY(-1px); }
        
        /* Fixed Client Area Framework Positioning */
        #client-viewport { width: 100%; height: calc(100% - 52px); margin-top: 52px; background: #000000; }
        iframe { width: 100%; height: 100%; border: none; background: #000000; }
    </style>
</head>
<body>

    <!-- Minimal Modern Control Dashboard Custom UI Interface -->
    <header id="klas-overlay-header">
        <div class="header-title">klas environment client v6.0</div>
        <button class="control-btn" onclick="goFullscreen()">🖥️ Fullscreen CloudPlayer</button>
    </header>

    <div id="client-viewport">
        <!-- Direct isolated CloudMoon Web Application framework pipeline for Roblox app deployment -->
        <iframe id="cloud-sandbox-frame" 
                src="https://cloudmoonapp.com" 
                sandbox="allow-apps allow-autoplay allow-forms allow-modals allow-orientation-lock allow-pointer-lock allow-popups allow-popups-to-escape-sandbox allow-same-origin allow-scripts"
                allow="autoplay; gamepad; fullscreen;">
        </iframe>
    </div>

    <script>
        // Enforce the custom tab label window strictly to 'klas'
        document.title = "klas";
        setInterval(() => { if (document.title !== "klas") document.title = "klas"; }, 150);

        // Native Fullscreen Engine API
        function goFullscreen() {
            const viewport = document.getElementById('client-viewport');
            if (viewport) {
                if (!document.fullscreenElement) {
                    viewport.requestFullscreen().catch(err => console.warn(err.message));
                } else {
                    document.exitFullscreen();
                }
            }
        }
        window.onbeforeunload = function() { return true; };
    </script>
</body>
</html>
