<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>klas</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; overflow: hidden; }
        body, html { width: 100%; height: 100%; background-color: #08080b; font-family: sans-serif; color: #ffffff; }
        
        /* Modern Header Layout */
        #klas-header {
            position: fixed; top: 0; left: 0; width: 100%; height: 60px;
            background: rgba(12, 12, 16, 0.85); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            display: flex; justify-content: space-between; align-items: center; padding: 0 24px; z-index: 100000;
        }
        .brand-logo {
            font-size: 18px; font-weight: 800; letter-spacing: 1px; text-transform: uppercase;
            background: linear-gradient(45deg, #a855f7, #ec4899); -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .btn-container { display: flex; gap: 8px; flex-wrap: wrap; }
        .action-btn {
            background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1);
            color: #ffffff; padding: 8px 14px; font-size: 12px; font-weight: 600; border-radius: 8px; cursor: pointer; transition: 0.2s ease;
        }
        .action-btn:hover { background: rgba(255, 255, 255, 0.15); border-color: rgba(255, 255, 255, 0.2); transform: translateY(-1px); }
        .active-game { background: linear-gradient(135deg, #a855f7, #6366f1) !important; border-color: transparent !important; }
        
        /* Main Viewport Container */
        #core-viewport { 
            width: 100%; height: calc(100% - 60px); margin-top: 60px; background: #000000; 
            position: relative; z-index: 1;
        }
        iframe { width: 100%; height: 100%; border: none; background: #000000; }

        /* Decoy Screen Container Layer */
        #decoy-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #ffffff; z-index: 999999; display: none;
        }
    </style>
</head>
<body>

    <!-- Decoy Screen (Fake Google Doc UI) -->
    <div id="decoy-screen">
        <iframe src="https://google.com" style="background:#ffffff; width:100%; height:100%;"></iframe>
    </div>

    <!-- Main Game Portal -->
    <header id="klas-header">
        <div class="brand-logo">klas portal v8.0</div>
        <div class="btn-container">
            <button id="btn-roblox" class="action-btn active-game" onclick="switchStream('roblox')">🎮 Roblox (CloudMoon)</button>
            <button id="btn-retro" class="action-btn" onclick="switchStream('retro')">🕹️ Retro Hub</button>
            <button id="btn-slope" class="action-btn" onclick="switchStream('slope')">🏀 Slope Game</button>
            <button class="action-btn" style="background: rgba(255,78,80,0.2);" onclick="toggleFullscreen()">🖥️ Fullscreen</button>
        </div>
    </header>

    <div id="core-viewport">
        <iframe id="game-engine-frame" 
                src="https://cloudmoonapp.com" 
                sandbox="allow-apps allow-autoplay allow-forms allow-modals allow-orientation-lock allow-pointer-lock allow-popups allow-popups-to-escape-sandbox allow-same-origin allow-scripts"
                allow="autoplay; gamepad; fullscreen;">
        </iframe>
    </div>

    <script>
        let isDecoyActive = false;
        const targetFavicon = "https://gstatic.com";
        const originalFavicon = document.querySelector("link[rel*='icon']") ? document.querySelector("link[rel*='icon']").href : "";

        // Dynamically handles tab appearance changes
        function updateTabProperties() {
            if (isDecoyActive) {
                document.title = "Class Notes - Google Docs";
                setFavicon(targetFavicon);
            } else {
                document.title = "klas";
                if (originalFavicon) setFavicon(originalFavicon);
            }
        }

        function setFavicon(url) {
            let link = document.querySelector("link[rel*='icon']");
            if (!link) {
                link = document.createElement('link');
                link.type = 'image/x-icon';
                link.rel = 'shortcut icon';
                document.getElementsByTagName('head')[0].appendChild(link);
            }
            link.href = url;
        }

        // Keep running title verification loop
        setInterval(updateTabProperties, 200);

        function switchStream(gameKey) {
            const frame = document.getElementById('game-engine-frame');
            const buttons = document.querySelectorAll('.btn-container .action-btn');
            buttons.forEach(btn => btn.classList.remove('active-game'));

            if (!frame) return;

            if (gameKey === 'roblox') {
                frame.src = "https://cloudmoonapp.com";
                document.getElementById('btn-roblox').classList.add('active-game');
            } else if (gameKey === 'retro') {
                frame.src = "https://retrogames.cc";
                document.getElementById('btn-retro').classList.add('active-game');
            } else if (gameKey === 'slope') {
                frame.src = "https://kbhgames.com";
                document.getElementById('btn-slope').classList.add('active-game');
            }
        }

        function toggleFullscreen() {
            const targetContainer = document.getElementById('core-viewport');
            if (targetContainer) {
                if (!document.fullscreenElement) {
                    targetContainer.requestFullscreen().catch(err => console.warn(err.message));
                } else {
                    document.exitFullscreen();
                }
            }
        }

        // Stealth Panic Key Trigger (Press Escape to drop/raise the document layer)
        window.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                const decoy = document.getElementById('decoy-screen');
                isDecoyActive = !isDecoyActive;
                
                if (isDecoyActive) {
                    decoy.style.display = 'block';
                } else {
                    decoy.style.display = 'none';
                }
                updateTabProperties();
            }
        });

        window.onbeforeunload = function() { return true; };
    </script>
</body>
</html>
