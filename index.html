<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>klas</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; overflow: hidden; }
        body, html { width: 100%; height: 100%; background-color: #08080b; font-family: sans-serif; color: #ffffff; }
        
        /* Premium Navigation Controller Custom Header */
        #klas-header {
            position: fixed; top: 0; left: 0; width: 100%; height: 60px;
            background: rgba(12, 12, 16, 0.85); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            display: flex; justify-content: space-between; align-items: center; padding: 0 24px; z-index: 100000;
        }
        .brand-logo {
            font-size: 18px; font-weight: 800; letter-spacing: 1px; text-transform: uppercase;
            background: linear-gradient(45deg, #a855f7, #ec4899); -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .btn-container { display: flex; gap: 8px; flex-wrap: wrap; }
        .action-btn {
            background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1);
            color: #ffffff; padding: 8px 14px; font-size: 12px; font-weight: 600; border-radius: 8px; cursor: pointer; transition: 0.2s ease;
        }
        .action-btn:hover { background: rgba(255, 255, 255, 0.15); border-color: rgba(255, 255, 255, 0.2); transform: translateY(-1px); }
        .active-game { background: linear-gradient(135deg, #a855f7, #6366f1) !important; border-color: transparent !important; }
        
        #core-viewport { width: 100%; height: calc(100% - 60px); margin-top: 60px; background: #000000; }
        iframe { width: 100%; height: 100%; border: none; background: #000000; }
    </style>
</head>
<body>

    <header id="klas-header">
        <div class="brand-logo">klas portal v6.0</div>
        <div class="btn-container">
            <button id="btn-roblox" class="action-btn active-game" onclick="switchStream('roblox')">🎮 Roblox App</button>
            <button id="btn-minecraft" class="action-btn" onclick="switchStream('minecraft')">⛏️ Minecraft</button>
            <button class="action-btn" style="background: rgba(255,78,80,0.2);" onclick="toggleFullscreen()">🖥️ Fullscreen Mode</button>
        </div>
    </header>

    <div id="core-viewport">
        <!-- Live Ultraviolet Proxy client pipeline dedicated to hosting application endpoints without cross-origin blocks -->
        <iframe id="game-engine-frame" 
                src="https://vercel.app" 
                allow="autoplay; gamepad; fullscreen;">
        </iframe>
    </div>

    <script>
        document.title = "klas";
        setInterval(() => { if (document.title !== "klas") document.title = "klas"; }, 150);

        function switchStream(gameKey) {
            const frame = document.getElementById('game-engine-frame');
            const buttons = document.querySelectorAll('.btn-container .action-btn');
            buttons.forEach(btn => btn.classList.remove('active-game'));

            if (!frame) return;

            if (gameKey === 'roblox') {
                // Decoded Ultraviolet proxy layout string targeting the secure games.ovh container mirror directly
                frame.src = "https://vercel.app";
                document.getElementById('btn-roblox').classList.add('active-game');
            } else if (gameKey === 'minecraft') {
                frame.src = "https://eaglercraft.com"; 
                document.getElementById('btn-minecraft').classList.add('active-game');
            }
        }

        function toggleFullscreen() {
            const targetContainer = document.getElementById('core-viewport');
            if (targetContainer) {
                if (!document.fullscreenElement) {
                    targetContainer.requestFullscreen().catch(err => console.warn(err.message));
                } else {
                    document.exitFullscreen();
                }
            }
        }
        window.onbeforeunload = function() { return true; };
    </script>
</body>
</html>
